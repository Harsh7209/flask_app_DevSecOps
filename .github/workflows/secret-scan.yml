name: secret_scan
on:
  workflow_call:
jobs:
  secret-check:
    runs-on: ubuntu-latest
    steps:
      - name: checking out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: checking leaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
